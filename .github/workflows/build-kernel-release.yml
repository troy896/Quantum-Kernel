name: Build and Release Quantum-Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel-gs201:
    uses: ./.github/workflows/sultan.yml
    secrets: inherit
    with:
      codename: "gs201"
      android_version: "android14"
      kernel_version: "6.1"

  build-kernel-zuma:
    uses: ./.github/workflows/sultan.yml
    secrets: inherit
    with:
      codename: "zuma"
      android_version: "android14"
      kernel_version: "6.1"

  build-kernel-zumapro:
    uses: ./.github/workflows/sultan.yml
    secrets: inherit
    with:
      codename: "zumapro"
      android_version: "android14"
      kernel_version: "6.1"

  trigger-release:
    runs-on: ubuntu-latest
    needs:
      - build-kernel-gs201
      - build-kernel-zuma
      - build-kernel-zumapro
    env:
      REPO_OWNER: Drizzy07x
      REPO_NAME: Quantum-Kernel
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: "Quantum-Kernel"
      RELEASE_NOTES: |
        Quantum-Kernel for Pixel Tensor devices

        ### Variants Included:
        * **stock**: Pure Quantum-Kernel base build
        * **wksu-susfs**: Quantum-Kernel with Wild KSU and SUSFS v2.0.0

        Tested on Android 16 stock
        SELinux Enforcing
        Wild KSU Built-In
        SUSFS Inline Mode

        Sultan Commits Used:
        -> https://github.com/kerneltoast/android_kernel_google_tensynos/commit/TENSYNOS_HASH

        Module:
        -> https://github.com/sidex15/ksu_module_susfs

        Manager:
        -> https://github.com/WildKernels/Wild_KSU

        Features:
        [+] Quantum-Kernel
        [+] Wild KSU
        [+] SUSFS v2.0.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate and Create New Tag
        run: |
          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name')
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0-r0"
          fi

          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')

          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV

          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Fetch and Inject Sultan Commits
        run: |
          TENSYNOS_COMMIT=$(git ls-remote https://github.com/kerneltoast/android_kernel_google_tensynos HEAD | awk '{print $1}')

          UPDATED_NOTES="${RELEASE_NOTES//TENSYNOS_HASH/$TENSYNOS_COMMIT}"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "RELEASE_NOTES<<$EOF" >> $GITHUB_ENV
          echo "$UPDATED_NOTES" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          release_name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets Dynamically
        run: |
          for file in ./downloaded-artifacts/kernel-*/*; do
            if [ -d "$file" ]; then
              continue
            fi

            dir=$(dirname "$file")
            filename=$(basename "$file")
            name="${filename%.*}"
            ext="${filename##*.}"

            new_filepath="$dir/${name}-${{ env.NEW_TAG }}.${ext}"
            mv "$file" "$new_filepath"

            echo "Uploading $new_filepath..."
            gh release upload ${{ env.NEW_TAG }} "$new_filepath"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ env.NEW_TAG }}

      - name: Display Files Uploaded
        run: |
          echo "GitHub release created with the following files:"
          ls ./downloaded-artifacts/**/*
